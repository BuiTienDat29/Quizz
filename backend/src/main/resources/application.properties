spring.application.name=backend
server.port=8080

# Cấu hình MySQL (Hỗ trợ biến môi trường trên Render)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/study_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto
# update: Tự động cập nhật schema DB khi có thay đổi Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
